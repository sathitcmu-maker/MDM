<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI COWORK DEMO - QMS Dashboard</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif, 'Helvetica Neue', Arial, sans-serif;
        }

        body {
            background-color: #f0f0f0;
            color: #333;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            overflow-x: hidden;
        }

        /* Container ออกแบบให้เหมาะกับหน้าจอแนวนอนสัดส่วน 16:9 */
        .container {
            width: 100%;
            max-width: 1280px; 
            background-color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 20px rgba(0,0,0,0.05);
        }

        /* ส่วนหัวข้อหลักด้านบน (Header) */
        .header-section {
            padding: 40px 20px 30px 20px;
            text-align: center;
            background-color: #ffffff;
        }

        .header-section h1 {
            font-size: 56px;
            font-weight: 400;
            letter-spacing: 2px;
            color: #000000;
            margin-bottom: 5px;
        }

        .header-section .author {
            font-size: 18px;
            font-weight: bold;
            color: #333333;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        .header-section .subtitle {
            font-size: 18px;
            color: #111111;
            letter-spacing: 0.5px;
        }

        /* 1. จุดลิงก์แบนเนอร์ระบบภาพรวมสีเขียวพาสเทล (Integrated Management Standard) */
        .integrated-banner-link {
            text-decoration: none;
            display: block;
            width: 100%;
        }

        .integrated-banner {
            background-color: #b7d7b2; 
            padding: 25px 20px;
            text-align: center;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .integrated-banner:hover {
            background-color: #a4c99e; 
        }

        .integrated-banner .click-to-open {
            font-size: 24px;
            color: #555555;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
            transition: all 0.3s ease;
        }

        .integrated-banner h2 {
            font-size: 42px;
            font-weight: bold;
            color: #555555;
            letter-spacing: 1px;
            line-height: 1.1;
            transition: all 0.3s ease;
        }

        .integrated-banner h2 .highlight {
            color: #bfa100; /* สีเหลืองทองหม่นตรงคำว่า DASHBOARD */
            display: block;
            margin-top: 5px;
        }

        /* เอฟเฟกต์ทำตัวหนาและเข้มขึ้นเมื่อเอาเมาส์วางแบนเนอร์หลัก */
        .integrated-banner-link:hover .integrated-banner h2 {
            color: #111111;
            font-weight: 800;
        }
        
        .integrated-banner-link:hover .integrated-banner .click-to-open {
            color: #111111;
            font-weight: bold;
        }

        .standards-list {
            font-size: 16px;
            color: #666666;
            margin-top: 15px;
            word-spacing: 2px;
        }
        
        .standards-list span {
            margin: 0 5px;
            color: #ffffff;
        }

        /* ส่วนโซนด้านล่างสีเทาอ่อนอ่อน */
        .individual-section {
            background-color: #f2f2f2; 
            flex-grow: 1;
            padding: 40px 40px 60px 40px;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
        }

        .individual-section h3 {
            font-size: 32px;
            font-weight: 400;
            color: #555555;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        /* ข้อความระบุใต้หัวข้อเพิ่มตามรูปภาพล่าสุด */
        .individual-section .section-click-prompt {
            font-size: 20px;
            color: #555555;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 35px;
        }

        /* กล่อง Grid จัดวางเหลือเพียง 2 ปุ่มให้สมดุลกึ่งกลาง */
        .button-grid {
            width: 100%;
            max-width: 800px;
            text-align: center;
            display: flex;
            justify-content: center;
            gap: 40px; /* ระยะห่างระหว่าง 2 ปุ่ม */
        }

        .card-link {
            text-decoration: none;
            display: block;
            width: 45%; /* ขยายขนาดปุ่มให้พอดีเมื่อเหลือ 2 ปุ่ม */
            max-width: 320px;
        }

        .card-button {
            border: 1px solid #777777;
            border-radius: 12px;
            padding: 22px 15px;
            min-height: 105px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: all 0.25s ease;
            cursor: pointer;
        }

        /* 2. สีพื้นหลังเฉพาะของปุ่ม ISO 22000 (โทนชมพูอมม่วงพาสเทล) */
        .bg-iso22000 {
            background-color: #e4d3db;
        }

        /* 3. สีพื้นหลังเฉพาะของปุ่ม ISO 45001 (โทนส้มเนื้อ/ครีมพาสเทล) */
        .bg-iso45001 {
            background-color: #f3dfca;
        }

        .card-button .title {
            font-size: 22px;
            color: #000000;
            font-weight: 400;
            line-height: 1.2;
            transition: all 0.25s ease;
        }

        .card-button .subtitle {
            font-size: 22px;
            color: #000000;
            font-weight: 400;
            line-height: 1.2;
            transition: all 0.25s ease;
        }

        /* เอฟเฟกต์การวางเมาส์ (Hover): เปลี่ยนสีฟอนต์เป็นตัวหนา/สีเข้มเขียวตามแนวสากล */
        .card-link:hover .card-button {
            border-color: #111111;
            box-shadow: 0 6px 15px rgba(0,0,0,0.08);
            transform: translateY(-2px);
            filter: brightness(1.03); /* สว่างขึ้นเล็กน้อยเวลาไฮไลต์ */
        }

        .card-link:hover .card-button .title,
        .card-link:hover .card-button .subtitle {
            font-weight: bold;
            color: #055922; 
        }

        /* ปรับดีไซน์กรณีหน้าจอแคบลง */
        @media (max-width: 768px) {
            .button-grid {
                flex-direction: column;
                align-items: center;
                gap: 20px;
            }
            .card-link {
                width: 80%;
            }
            .header-section h1 { font-size: 40px; }
            .integrated-banner h2 { font-size: 28px; }
        }
    </style>
</head>
<body>

    <div class="container">
        
        <div class="header-section">
            <h1>AI COWORK DEMO</h1>
            <div class="author">BY MR. SATHIT CHOBPIMAI</div>
            <div class="subtitle">EXAMPLE OF MY AI CAPABILITY IN VERY SHORT TIME  </div>
        </div>

        <a href="https://sathitcmu-maker.github.io/MDM/ims.html" target="_blank" class="integrated-banner-link">
            <div class="integrated-banner">
                <div class="click-to-open">CLICK TO OPEN</div>
                <h2>
                    INTEGRATED MANAGEMENT STANDARD
                    <span class="highlight">DASHBOARD</span>
                </h2>
                <div class="standards-list">
                    GHPs/HACCP <span>|</span> ISO22000 <span>|</span> ISO14001 <span>|</span> ISO 45001 <span>|</span> ISO 17025 <span>|</span> BAP <span>|</span> GLOBAL GAP
                </div>
            </div>
        </a>

        <div class="individual-section">
            <h3>INDIVIDUAL DASHBOARD</h3>
            <div class="section-click-prompt">CLICK TO OPEN</div>
            
            <div class="button-grid">
                
                <a href="https://sathitcmu-maker.github.io/MDM/iso22000.html" target="_blank" class="card-link">
                    <div class="card-button bg-iso22000">
                        <div class="title">ISO 22000</div>
                        <div class="subtitle">FSMS</div>
                    </div>
                </a>

                <a href="https://sathitcmu-maker.github.io/MDM/ISO45001.html" target="_blank" class="card-link">
                    <div class="card-button bg-iso45001">
                        <div class="title">ISO 45001</div>
                        <div class="subtitle">OH&S</div>
                    </div>
                </a>

            </div>
        </div>

    </div>

</body>
</html>
