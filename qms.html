<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI COWORK DEMO - QMS Dashboard</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif, 'Helvetica Neue', Arial, sans-serif;
        }

        body {
            background-color: #f0f0f0;
            color: #333;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            overflow-x: hidden;
        }

        /* Container designed for 16:9 Aspect Ratio aspect layout */
        .container {
            width: 100%;
            max-width: 1280px; /* Standard 16:9 baseline width */
            background-color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 20px rgba(0,0,0,0.05);
        }

        /* Top Header Section */
        .header-section {
            padding: 40px 20px 30px 20px;
            text-align: center;
            background-color: #ffffff;
        }

        .header-section h1 {
            font-size: 56px;
            font-weight: 400;
            letter-spacing: 2px;
            color: #000000;
            margin-bottom: 5px;
        }

        .header-section .author {
            font-size: 18px;
            font-weight: bold;
            color: #333333;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        .header-section .subtitle {
            font-size: 18px;
            color: #111111;
            letter-spacing: 0.5px;
        }

        /* Main Integrated Management Standard Dashboard Banner (Clickable) */
        .integrated-banner-link {
            text-decoration: none;
            display: block;
            width: 100%;
        }

        .integrated-banner {
            background-color: #b7d7b2; /* Sage green tone matching the image */
            padding: 25px 20px;
            text-align: center;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .integrated-banner:hover {
            background-color: #a4c99e; /* Slightly darker green on hover */
            box-shadow: inset 0 0 10px rgba(0,0,0,0.05);
        }

        .integrated-banner .click-to-open {
            font-size: 24px;
            color: #555555;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
            transition: all 0.3s ease;
        }

        .integrated-banner h2 {
            font-size: 42px;
            font-weight: bold;
            color: #555555;
            letter-spacing: 1px;
            line-height: 1.1;
            transition: all 0.3s ease;
        }

        .integrated-banner h2 .highlight {
            color: #bfa100; /* Dark gold/yellow tone matching the image */
            display: block;
            margin-top: 5px;
        }

        /* Hover behavior for text inside banner */
        .integrated-banner-link:hover .integrated-banner h2 {
            color: #111111;
            font-weight: 800;
        }
        
        .integrated-banner-link:hover .integrated-banner .click-to-open {
            color: #111111;
            font-weight: bold;
        }

        /* Small Sub-standards listed under the main banner */
        .standards-list {
            font-size: 16px;
            color: #666666;
            margin-top: 15px;
            word-spacing: 2px;
        }
        
        .standards-list span {
            margin: 0 5px;
            color: #b7d7b2;
        }

        /* Bottom Individual Dashboard Section */
        .individual-section {
            background-color: #f2f2f2; /* Light grey bottom background */
            flex-grow: 1;
            padding: 40px 40px 60px 40px;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .individual-section h3 {
            font-size: 32px;
            font-weight: 400;
            color: #555555;
            letter-spacing: 1px;
            margin-bottom: 40px;
            text-transform: uppercase;
        }

        /* Grid layout for buttons (using inline-block/table fallback structure for wide compliance) */
        .button-grid {
            width: 100%;
            max-width: 1100px;
            text-align: center;
        }

        .card-link {
            text-decoration: none;
            display: inline-block;
            width: 30%;
            margin: 0 1.5%;
            vertical-align: top;
        }

        .card-button {
            background-color: #f2f2f2;
            border: 1px solid #777777;
            border-radius: 12px;
            padding: 22px 15px;
            min-height: 105px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: all 0.25s ease;
            cursor: pointer;
        }

        .card-button .title {
            font-size: 22px;
            color: #000000;
            font-weight: 400;
            line-height: 1.2;
            transition: all 0.25s ease;
        }

        .card-button .subtitle {
            font-size: 22px;
            color: #000000;
            font-weight: 400;
            line-height: 1.2;
            transition: all 0.25s ease;
        }

        /* Hover effects for individual cards: Bold text, dark background, or color change */
        .card-link:hover .card-button {
            background-color: #ffffff;
            border-color: #333333;
            box-shadow: 0 6px 15px rgba(0,0,0,0.08);
            transform: translateY(-2px);
        }

        .card-link:hover .card-button .title,
        .card-link:hover .card-button .subtitle {
            font-weight: bold;
            color: #055922; /* Highlighting corporate green tone on hover */
        }

        /* Responsive styling for screen height/width adjustments */
        @media (max-width: 900px) {
            .card-link {
                width: 80%;
                margin: 15px 0;
            }
            .header-section h1 { font-size: 40px; }
            .integrated-banner h2 { font-size: 28px; }
        }
    </style>
</head>
<body>

    <div class="container">
        
        <!-- Header Section -->
        <div class="header-section">
            <h1>AI COWORK DEMO</h1>
            <div class="author">BY MR. SATHIT CHOBPIMAI</div>
            <div class="subtitle">APPLICATION TO MULTI INTERNATIONAL STANDARD IN FOOD INDUSTRY</div>
        </div>

        <!-- 1. Integrated Management System Dashboard Link -->
        <a href="https://sathitcmu-maker.github.io/MDM/ims.html" target="_blank" class="integrated-banner-link">
            <div class="integrated-banner">
                <div class="click-to-open">CLICK TO OPEN</div>
                <h2>
                    INTEGRATED MANAGEMENT STANDARD
                    <span class="highlight">DASHBOARD</span>
                </h2>
                <div class="standards-list">
                    GHPs/HACCP <span>|</span> ISO22000 <span>|</span> ISO14001 <span>|</span> ISO45001 <span>|</span> ISO 17025 <span>|</span> BAP <span>|</span> GLOBAL GAP
                </div>
            </div>
        </a>

        <!-- Individual Dashboard Section -->
        <div class="individual-section">
            <h3>INDIVIDUAL DASHBOARD</h3>
            
            <div class="button-grid">
                
                <!-- 2. ISO 22000 FSMS Link -->
                <a href="https://sathitcmu-maker.github.io/MDM/iso22000.html" target="_blank" class="card-link">
                    <div class="card-button">
                        <div class="title">ISO 22000</div>
                        <div class="subtitle">FSMS</div>
                    </div>
                </a>

                <!-- 3. ISO 14001 EMS Link -->
                <a href="https://sathitcmu-maker.github.io/MDM/ISO14001.html" target="_blank" class="card-link">
                    <div class="card-button">
                        <div class="title">ISO 14001</div>
                        <div class="subtitle">EMS</div>
                    </div>
                </a>

                <!-- 4. ISO 45001 OH&S Link -->
                <a href="https://sathitcmu-maker.github.io/MDM/ISO45001.html" target="_blank" class="card-link">
                    <div class="card-button">
                        <div class="title">ISO 45001</div>
                        <div class="subtitle">OH&S</div>
                    </div>
                </a>

            </div>
        </div>

    </div>

</body>
</html>
